<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Antaboga ERP - Sistem Manajemen Pendidikan Terpadu">
    <title>Antaboga ERP — Education Resource Planning</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-bg">
            <div class="dragon-glow"></div>
        </div>
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <svg viewBox="0 0 80 80" class="dragon-icon">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#c9a227;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#f7d06b;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle cx="40" cy="40" r="36" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
                        <path d="M25 50 Q30 25 40 20 Q50 25 55 50 Q50 45 40 42 Q30 45 25 50Z" fill="url(#grad1)" opacity="0.9"/>
                        <path d="M32 35 Q36 15 40 12 Q44 15 48 35" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>
                        <circle cx="35" cy="32" r="2" fill="#1a1a2e"/>
                        <circle cx="45" cy="32" r="2" fill="#1a1a2e"/>
                        <path d="M20 48 Q22 40 28 38" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>
                        <path d="M60 48 Q58 40 52 38" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>
                    </svg>
                    <h1>Antaboga</h1>
                    <p class="login-subtitle">Education Resource Planning</p>
                </div>
                <form id="loginForm" autocomplete="off">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required autocomplete="username" placeholder="Masukkan username">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Masukkan password">
                    </div>
                    <div id="loginError" class="error-msg" style="display:none"></div>
                    <button type="submit" id="loginBtn" class="btn-primary">
                        <span>Masuk</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>
                <div class="login-footer">
                    <p>🐉 Powered by Kamsib</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="appScreen" class="screen">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 40 40" class="sidebar-icon">
                        <defs><linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#c9a227"/><stop offset="100%" style="stop-color:#f7d06b"/></linearGradient></defs>
                        <path d="M12 26 Q15 12 20 10 Q25 12 28 26 Q25 23 20 22 Q15 23 12 26Z" fill="url(#grad2)"/>
                    </svg>
                    <span class="sidebar-title">Antaboga</span>
                </div>
            </div>
            <ul class="sidebar-menu">
                <li class="menu-item active" data-module="dashboard"><span class="menu-icon">📊</span><span class="menu-text">Dashboard</span></li>
                <li class="menu-item" data-module="students"><span class="menu-icon">🎓</span><span class="menu-text">Siswa</span></li>
                <li class="menu-item" data-module="teachers"><span class="menu-icon">👨‍🏫</span><span class="menu-text">Guru</span></li>
                <li class="menu-item" data-module="academic"><span class="menu-icon">📚</span><span class="menu-text">Akademik</span></li>
                <li class="menu-item" data-module="finance"><span class="menu-icon">💰</span><span class="menu-text">Keuangan</span></li>
                <li class="menu-item" data-module="attendance"><span class="menu-icon">📋</span><span class="menu-text">Absensi</span></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <span id="userName" class="user-name">Admin</span>
                        <span id="userRole" class="user-role">Administrator</span>
                    </div>
                </div>
                <button id="logoutBtn" class="btn-logout" title="Keluar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </div>
        </nav>

        <!-- Content Area -->
        <main id="content" class="content">
            <!-- Dynamic content loaded here -->
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="/js/app.js"></script>
</body>
</html>
